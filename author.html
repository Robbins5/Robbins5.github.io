<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting | The AI-Ready Audit</title>
  <meta http-equiv="refresh" content="0; url=about.html" />
</head>
<body>
  <p>This page has moved. <a href="about.html">Click here</a> if you are not redirected automatically.</p>
  <script>
  (function() {
    const main = document.querySelector('main');
    if (!main) return;
    const words = main.innerText.trim().split(/\s+/).length;
    const minutes = Math.ceil(words / 200);
    const label = minutes <= 1 ? '1 min read' : minutes + ' min read';
    const header = document.querySelector('.page-header, .hero, header, main h1');
    if (header) {
      const rt = document.createElement('div');
      rt.className = 'reading-time';
      rt.textContent = label;
      header.parentNode.insertBefore(rt, header.nextSibling);
    }
  })();
  </script>
</body>
</html>
